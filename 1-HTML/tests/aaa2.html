<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login VivaUnimed</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
}

/* Lado esquerdo (verde) */
.left {
    width: 40%;
    background-color: #0a8f4c;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.logo {
    border: 2px solid white;
    padding: 10px 20px;
    border-radius: 10px;
    margin-bottom: 40px;
    font-weight: bold;
}

.left h1 {
    font-size: 28px;
    text-align: center;
}

/* Lado direito */
.right {
    width: 60%;
    background-color: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    width: 400px;
}

.login-box h2 {
    margin-bottom: 30px;
    font-size: 28px;
}

label {
    display: block;
    margin-top: 15px;
    margin-bottom: 5px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    background-color: #ddd;
}

.forgot {
    font-size: 14px;
    margin-top: 5px;
}

button {
    margin-top: 30px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background-color: #0a8f4c;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background-color: #087a41;
}
</style>

</head>

<body>

<div class="left">
    <div class="logo">Unimed Litoral Sul/RS</div>
    <h1>Agenda VivaUnimed<br>Sistema de Fila Inteligente</h1>
</div>

<div class="right">
    <div class="login-box">
        <h2>Bem-vindo</h2>

        <label>E-mail Corporativo</label>
        <input type="email">

        <label>Senha</label>
        <input type="password">

        <div class="forgot">Esqueci a minha senha</div>

        <button>Entrar no painel</button>
    </div>
</div>

</body>
</html>
