<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>VivaUnimed</title>

<style>

/* ================= RESET ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial;
}

body {
    background: #f4f6f8;
}

/* ================= LAYOUT ================= */
.screen {
    display: none;
    height: 100vh;
}

.screen.active {
    display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 260px;
    background: #0a8f4c;
    color: white;
    padding: 30px 20px;
}

.logo {
    border: 2px solid white;
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    margin-bottom: 40px;
    font-weight: bold;
}

.menu-item {
    margin: 18px 0;
    cursor: pointer;
}

/* ===== MAIN ===== */
.main {
    flex: 1;
    padding: 40px;
}

/* ================= HEADER ================= */
.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 25px;
}

.title {
    font-size: 26px;
    color: #0a8f4c;
}

.subtitle {
    font-size: 14px;
    color: #777;
}

/* ================= FORM ================= */
.form {
    max-width: 900px;
}

.form-row {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.form-group {
    flex: 1;
}

label {
    font-size: 12px;
    color: #0a8f4c;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 8px;
    border: none;
    background: #e9ecef;
}

/* ================= ALERT BOX ================= */
.alert-box {
    background: #f8d7da;
    color: #842029;
    padding: 15px;
    border-radius: 8px;
    margin-top: 5px;
}

/* ================= BUTTON ================= */
.btn-primary {
    width: 100%;
    background: #0a8f4c;
    color: white;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    margin-top: 20px;
    cursor: pointer;
}

.footer-text {
    text-align: center;
    font-size: 12px;
    color: #888;
    margin-top: 10px;
}

</style>
</head>

<body>

<!-- ================= NO-SHOW ================= -->
<div id="noshow" class="screen active">

    <div class="sidebar">
        <div class="logo">Unimed</div>
        <div class="menu-item">Dashboard</div>
        <div class="menu-item">Agenda</div>
        <div class="menu-item">Cadastro Profissionais</div>
        <div class="menu-item">Cadastro No-show</div>
    </div>

    <div class="main">

        <div class="header">
            <div>
                <div class="title">Nova Vaga No-Show</div>
                <div class="subtitle">
                    Preencha as informações para registrar a disponibilidade imediata.
                </div>
            </div>
        </div>

        <div class="form">

            <!-- PROFISSIONAL -->
            <div class="form-group">
                <label>PROFISSIONAL DE SAÚDE</label>
                <select>
                    <option>Selecione o profissional</option>
                </select>
            </div>

            <!-- ESPECIALIDADE -->
            <div class="form-group">
                <label>ESPECIALIDADE</label>
                <select>
                    <option>Selecione a especialidade</option>
                </select>
            </div>

            <!-- LINHA -->
            <div class="form-row">
                <div class="form-group">
                    <label>UNIDADE</label>
                    <select>
                        <option>Selecione a unidade</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>DATA DA VAGA</label>
                    <input type="date">
                </div>
            </div>

            <!-- LINHA -->
            <div class="form-row">
                <div class="form-group">
                    <label>HORÁRIO ESPECÍFICO</label>
                    <input type="time">
                </div>

                <div class="form-group">
                    <label>TIPO DE VAGA</label>
                    <div class="alert-box">
                        No-Show (Ausência)
                    </div>
                </div>
            </div>

            <button class="btn-primary">
                Cadastrar Vaga →
            </button>

            <div class="footer-text">
                A vaga será notificada imediatamente aos pacientes na lista de espera.
            </div>

        </div>

    </div>

</div>

</body>
</html>
